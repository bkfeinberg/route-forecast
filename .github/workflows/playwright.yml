name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
permissions:
  contents: read
  security-events: write
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: run actual build
      run: npm run prod-local
    - name: Run Playwright tests
      run: npx playwright test
      env:
        BITLY_TOKEN: ${{ secrets.BITLY_TOKEN }}
        SHORT_IO_KEY: ${{ secrets.SHORT_IO_KEY }}
        SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        MAPS_KEY: ${{ secrets.MAPS_KEY }}
        TIMEZONE_API_KEY: ${{ secrets.TIMEZONE_API_KEY }}
        SENTRY_TRACE_SAMPLE_RATE: ${{ secrets.SENTRY_TRACE_SAMPLE_RATE }}
         # SENTRY_ENVIRONMENT: 'playwright-tests'
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
